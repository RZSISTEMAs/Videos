<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RZ HUD - RZSISTEMA</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Overlay Central Inovador -->
    <div id="central-overlay">
        <h1 id="brand-main">RZSISTEMA</h1>
        <div class="orbit-container">
            <span id="brand-mods">Mods</span>
        </div>
    </div>

    <!-- Interface Lateral Superior -->
    <div id="top-right-hud">
        <div class="info-group">
            <span class="label">LOCALIZAÇÃO</span>
            <span id="street-text">Aguardando...</span>
            <span id="zone-text">Carregando mapa...</span>
        </div>
        <div class="info-group">
            <div class="time-row">
                <span id="game-time">00:00</span>
                <div id="assalto-badge" class="hidden">ASSALTO LIBERADO</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
