<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RZ HUD - RZSISTEMA</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
</head>
<body>
    <!-- Overlay Central Inovador (Movido para o Topo) -->
    <div id="central-overlay">
        <h1 id="brand-main">RZSISTEMA</h1>
        <div class="orbit-container">
            <span id="brand-mods">Mods</span>
        </div>
    </div>

    <!-- Interface Lateral Superior (Sem fundos pretos, apenas ícones e cores) -->
    <div id="top-right-hud">
        <div class="info-item">
            <i class="fa-solid fa-location-dot icon-loc"></i>
            <div class="loc-details">
                <span id="street-text">...</span>
                <span id="zone-text">...</span>
            </div>
        </div>
        <div class="info-item">
            <i class="fa-solid fa-clock icon-time"></i>
            <span id="game-time">00:00</span>
            <div id="assalto-badge" class="hidden">ASSALTO LIBERADO</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
